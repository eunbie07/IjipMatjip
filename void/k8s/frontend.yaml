apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  namespace: ijipmatjip
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: ijipmatjip/frontend:latest
        ports:
        - containerPort: 4000
        env:
        - name: VITE_CLOUD_API_BASE
          valueFrom:
            configMapKeyRef:
              name: ijipmatjip-config
              key: VITE_CLOUD_API_BASE
        - name: VITE_LOCAL_API_BASE
          valueFrom:
            configMapKeyRef:
              name: ijipmatjip-config
              key: VITE_LOCAL_API_BASE
        livenessProbe:
          httpGet:
            path: /
            port: 4000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 4000
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: ijipmatjip
spec:
  selector:
    app: frontend
  ports:
  - port: 80
    targetPort: 4000
  type: LoadBalancer
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend-ingress
  namespace: ijipmatjip
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - your-domain.com
    secretName: frontend-tls
  rules:
  - host: your-domain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80