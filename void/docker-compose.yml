version: '3.8'

services:
  # Backend Cloud Service
  backend-cloud:
    build: 
      context: ./eunbi/backend-cloud
      dockerfile: Dockerfile
    container_name: ijipmatjip-backend-cloud
    ports:
      - "3000:3000"
    environment:
      - JWT_SECRET=your-super-secret-jwt-key-change-in-production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # Frontend Service  
  frontend:
    build:
      context: ./eunbi/frontend
      dockerfile: Dockerfile
    container_name: ijipmatjip-frontend
    ports:
      - "4000:4000"
    environment:
      - VITE_CLOUD_API_BASE=http://localhost:3000
      - VITE_LOCAL_API_BASE=http://host.docker.internal:3010
    depends_on:
      - backend-cloud
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

# No volumes needed

networks:
  default:
    name: ijipmatjip-network