apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-cloud-deployment
  namespace: ijipmatjip
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend-cloud
  template:
    metadata:
      labels:
        app: backend-cloud
    spec:
      containers:
      - name: backend-cloud
        image: ijipmatjip/backend-cloud:latest
        ports:
        - containerPort: 3000
        env:
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: ijipmatjip-secret
              key: JWT_SECRET
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: backend-cloud-service
  namespace: ijipmatjip
spec:
  selector:
    app: backend-cloud
  ports:
  - port: 3000
    targetPort: 3000
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-cloud-hpa
  namespace: ijipmatjip
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend-cloud-deployment
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80