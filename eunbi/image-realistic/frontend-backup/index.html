<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI 실사 인테리어 생성</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#ff7e97',
            secondary: '#e6678a',
            background: '#F9FAFB',
            surface: '#FFFFFF',
            'text-primary': '#111827',
            'text-secondary': '#6B7280',
            border: '#D1D5DB',
            accent: '#ff7e97',
            danger: '#EF4444'
          }
        }
      }
    }
  </script>
</head>
<body class="bg-background min-h-screen">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="mb-8">
      <h1 class="text-3xl font-bold text-text-primary mb-2">AI 실사 인테리어 생성</h1>
      <p class="text-text-secondary">다양한 AI 모델로 방 스크린샷을 실사 인테리어로 변환합니다</p>
    </div>
    
    <div class="bg-surface rounded-xl border border-border shadow-sm p-6 mb-8">
        <form id="form" class="space-y-6">
          <!-- Provider 선택 -->
          <div class="space-y-2">
            <label class="block text-sm font-semibold text-text-primary">Provider</label>
            <select id="provider" class="w-full px-4 py-3 border border-border rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent transition-colors">
              <option value="composite">🚀 Composite (JSON + Image)</option>
              <option value="vertex-json">Vertex AI (JSON)</option>
              <option value="replicate-image">Replicate (Image)</option>
              <option value="stability-image">Stability (Image)</option>
            </select>
          </div>

          <!-- JSON 업로드 필드 -->
          <div class="space-y-2" id="json-row">
            <label class="block text-sm font-semibold text-text-primary">JSON 레이아웃 파일</label>
            <div class="border-2 border-dashed border-border rounded-xl p-6 text-center hover:border-primary transition-colors">
              <input type="file" id="jsonFile" accept=".json" class="hidden" />
              <div class="text-4xl mb-2">📄</div>
              <p class="text-text-secondary mb-2">JSON 파일을 선택하세요</p>
              <button type="button" onclick="document.getElementById('jsonFile').click()" class="px-4 py-2 bg-primary text-white rounded-lg hover:bg-secondary transition-colors">
                파일 선택
              </button>
            </div>
          </div>

          <!-- 이미지 업로드 필드 -->
          <div class="space-y-2" id="image-row">
            <label class="block text-sm font-semibold text-text-primary">스크린샷 이미지</label>
            <div class="border-2 border-dashed border-border rounded-xl p-6 text-center hover:border-primary transition-colors">
              <input type="file" id="imageFile" accept="image/*" class="hidden" />
              <div class="text-4xl mb-2">🖼️</div>
              <p class="text-text-secondary mb-2">이미지 파일을 선택하세요</p>
              <button type="button" onclick="document.getElementById('imageFile').click()" class="px-4 py-2 bg-primary text-white rounded-lg hover:bg-secondary transition-colors">
                파일 선택
              </button>
            </div>
          </div>
          
          <!-- Style 선택 -->
          <div class="space-y-2">
            <label class="block text-sm font-semibold text-text-primary">인테리어 스타일</label>
            <select id="style" class="w-full px-4 py-3 border border-border rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent transition-colors">
              <option value="scandinavian">🏠 Scandinavian (스칸디나비안)</option>
              <option value="modern">✨ Modern (모던)</option>
              <option value="bohemian">🌿 Bohemian (보헤미안)</option>
              <option value="japanese">🎌 Japanese (일본식)</option>
            </select>
          </div>

          <!-- Composite 모드 전용 설정 -->
          <div id="composite-settings" class="space-y-6 p-6 bg-window-fill border border-window-stroke rounded-xl">
            <h3 class="text-lg font-semibold text-text-primary">고급 설정</h3>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
              <div class="space-y-2">
                <label class="block text-sm font-semibold text-text-primary">Control Method</label>
                <select id="control" class="w-full px-4 py-3 border border-border rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent transition-colors">
                  <option value="canny">🖋️ Canny Edge (권장)</option>
                  <option value="depth">📏 Depth Control</option>
                </select>
              </div>
              
              <div class="space-y-2">
                <label class="block text-sm font-semibold text-text-primary">AI Provider</label>
                <select id="composite-provider" class="w-full px-4 py-3 border border-border rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent transition-colors">
                  <option value="vertex">🔵 Vertex AI (권장)</option>
                  <option value="flux">🚀 FLUX Ultra (고해상도)</option>
                  <option value="replicate">🔄 Replicate</option>
                  <option value="stability">⚡ Stability AI</option>
                </select>
              </div>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
              <div class="space-y-2">
                <label class="block text-sm font-semibold text-text-primary">변환 모드</label>
                <select id="mode" class="w-full px-4 py-3 border border-border rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent transition-colors">
                  <option value="strict">🔒 Strict (구조 완전 고정)</option>
                  <option value="interpretive">🎨 Interpretive (약간의 변형 허용)</option>
                </select>
              </div>
              
              <div class="space-y-2">
                <label class="block text-sm font-semibold text-text-primary">투명도: <span id="alpha-value" class="text-primary">0.6</span></label>
                <input type="range" id="alpha" min="0.1" max="1.0" step="0.1" value="0.6" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer slider" />
              </div>
            </div>
          </div>

          <!-- 생성 버튼 -->
          <button type="submit" class="w-full bg-primary text-white py-4 px-6 rounded-xl font-semibold text-lg hover:bg-secondary transition-colors shadow-lg hover:shadow-xl">
            ✨ AI 인테리어 생성하기
          </button>
        </form>
      </div>

      <!-- 결과 영역 -->
      <div id="out" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mt-8"></div>

      <!-- 사용 가이드 -->
      <div class="mt-12 p-6 bg-blue-50 border border-blue-200 rounded-xl">
        <h3 class="text-lg font-semibold text-blue-900 mb-3">💡 사용 가이드</h3>
        <div class="text-blue-800 space-y-2">
          <div class="flex items-center gap-2">
            <span class="w-6 h-6 bg-blue-500 text-white rounded-full flex items-center justify-center text-sm font-bold">1</span>
            <span>JSON 파일과 스크린샷 이미지를 업로드하세요</span>
          </div>
          <div class="flex items-center gap-2">
            <span class="w-6 h-6 bg-blue-500 text-white rounded-full flex items-center justify-center text-sm font-bold">2</span>
            <span>원하는 인테리어 스타일을 선택하세요</span>
          </div>
          <div class="flex items-center gap-2">
            <span class="w-6 h-6 bg-blue-500 text-white rounded-full flex items-center justify-center text-sm font-bold">3</span>
            <span>AI Provider와 세부 설정을 조정하세요</span>
          </div>
          <div class="flex items-center gap-2">
            <span class="w-6 h-6 bg-blue-500 text-white rounded-full flex items-center justify-center text-sm font-bold">4</span>
            <span>생성 버튼을 클릭하여 실사 인테리어를 만들어보세요</span>
          </div>
        </div>
      </div>
    </div>
    
    <script src="script.js"></script>
  </body>
</html>
