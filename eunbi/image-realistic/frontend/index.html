<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Realistic Room i2i</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="wrap">
    <h1>실사 인테리어 생성 (Stability / Replicate / Vertex)</h1>
    <form id="form">
      <div class="row">
        <label>이미지</label>
        <input type="file" id="image" accept="image/*" required />
      </div>
      <div class="row">
        <label>Provider</label>
        <select id="provider" onchange="updateModelOptions()">
          <option value="vertex">vertex</option>
          <option value="replicate">replicate</option>
          <option value="stability">stability</option>
        </select>
      </div>
      <div class="row" id="model-row" style="display: none;">
        <label>Model</label>
        <select id="model" onchange="updateStructureOptions()">
          <option value="default">Default SDXL</option>
          <option value="depth2img">ControlNet Depth2Img (레이아웃 유지)</option>
          <option value="controlnet">ControlNet Structure (구조 보존)</option>
          <option value="fooocus">Fooocus Inpainting (부분 수정)</option>
          <option value="flux_ultra">FLUX Pro Ultra (고해상도)</option>
          <option value="pipeline_3d_capture">3D Capture Pipeline (2단계 파이프라인)</option>
        </select>
      </div>
      <div class="row" id="structure-row" style="display: none;">
        <label>Structure Type</label>
        <select id="structure">
          <option value="depth">Depth (깊이)</option>
          <option value="canny">Canny (외곽선)</option>
          <option value="hed">HED (경계)</option>
          <option value="normal">Normal (법선)</option>
          <option value="openpose">OpenPose (포즈)</option>
          <option value="scribble">Scribble (스케치)</option>
        </select>
      </div>
      <div class="row" id="style-row">
        <label>Style</label>
        <select id="style">
          <option value="scandinavian">Scandinavian (스칸디나비안)</option>
          <option value="modern">Modern (모던)</option>
          <option value="bohemian">Bohemian (보헤미안)</option>
          <option value="japanese">Japanese (일본식)</option>
        </select>
      </div>
      <button>생성</button>
    </form>
    <div id="out" class="grid"></div>
  </div>
  <script src="script.js"></script>
</body>
</html>
