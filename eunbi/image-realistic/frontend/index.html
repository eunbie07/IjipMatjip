<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Realistic Room Generation</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="wrap">
    <h1>실사 인테리어 생성</h1>
    <form id="form">
      <div class="row">
        <label>Provider</label>
        <select id="provider">
          <option value="composite">🚀 Composite (JSON + Image)</option>
          <option value="vertex-json">Vertex AI (JSON)</option>
          <option value="replicate-image">Replicate (Image)</option>
          <option value="stability-image">Stability (Image)</option>
        </select>
      </div>

      <!-- JSON 업로드 필드 (composite 기본 표시) -->
      <div class="row" id="json-row">
        <label>JSON 레이아웃 파일</label>
        <input type="file" id="jsonFile" accept=".json" />
      </div>

      <!-- 이미지 업로드 필드 (composite 기본 표시) -->
      <div class="row" id="image-row">
        <label>스크린샷 이미지</label>
        <input type="file" id="imageFile" accept="image/*" />
      </div>
      
      <div class="row" id="style-row">
        <label>Style</label>
        <select id="style">
          <option value="scandinavian">Scandinavian (스칸디나비안)</option>
          <option value="modern">Modern (모던)</option>
          <option value="bohemian">Bohemian (보헤미안)</option>
          <option value="japanese">Japanese (일본식)</option>
        </select>
      </div>

      <!-- Composite 모드 전용 설정 (composite 기본 표시) -->
      <div class="composite-settings" id="composite-settings">
        <div class="row">
          <label>Control Method</label>
          <select id="control">
            <option value="canny">Canny Edge (권장)</option>
            <option value="depth">Depth Control</option>
          </select>
        </div>
        
        <div class="row">
          <label>Provider</label>
          <select id="composite-provider">
            <option value="gemini">💎 Gemini (최고 품질)</option>
            <option value="vertex">Vertex AI (권장)</option>
            <option value="flux">🚀 FLUX Ultra (고해상도)</option>
            <option value="replicate">Replicate</option>
            <option value="stability">Stability AI</option>
          </select>
        </div>
        
        <div class="row">
          <label>Mode</label>
          <select id="mode">
            <option value="strict">Strict (구조 완전 고정)</option>
            <option value="interpretive">Interpretive (약간의 변형 허용)</option>
          </select>
        </div>
        
        <div class="row">
          <label>Alpha (투명도): <span id="alpha-value">0.6</span></label>
          <input type="range" id="alpha" min="0.1" max="1.0" step="0.1" value="0.6" />
        </div>
      </div>

      <button>생성</button>
    </form>
    <div id="out" class="grid"></div>
  </div>
  <script src="script.js"></script>
</body>
</html>
