name: Deploy Backend Cloud

on:
  push:
    branches: [ dev-eunbi ]
    paths:
      - 'eunbi/room-measure/backend-cloud/**'
      - '.github/workflows/deploy-backend-cloud.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.EUNBI_DOCKERHUB_USERNAME }}
          password: ${{ secrets.EUNBI_DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          cd eunbi/room-measure/backend-cloud
          IMAGE_TAG=${GITHUB_SHA}
          docker build -t eunbie/room-measure-cloud:$IMAGE_TAG .
          docker push eunbie/room-measure-cloud:$IMAGE_TAG

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.EUNBI_NODE_EC2_HOST }}
          username: node1
          key: ${{ secrets.EUNBI_NODE_EC2_SSH_KEY }}
          envs: GITHUB_SHA
          script: |
            set -euo pipefail

            IMAGE_TAG=${GITHUB_SHA}
            docker stop room-measure-cloud 2>/dev/null || true
            docker rm room-measure-cloud 2>/dev/null || true

            docker pull eunbie/room-measure-cloud:$IMAGE_TAG

            cd /home/node1/app/eunbi/room-measure/backend-cloud
            
            # .env 파일 확인 및 생성
            if [ ! -f .env ]; then
              if [ -f .env.example ]; then
                cp .env.example .env
                echo "⚠️ .env.example에서 .env 파일을 생성했습니다. 환경변수를 설정해주세요."
              else
                echo "❌ .env.example 파일이 없습니다. 환경변수 설정이 필요합니다"
                exit 1
              fi
            fi
            
            # 최신 소스 코드 동기화 (새로운 모듈 구조 포함)
            git pull origin dev-eunbi || echo "Git pull 실패 - 계속 진행"

            docker run -d \
              --name room-measure-cloud \
              -p 3000:3000 \
              --env-file .env \
              --restart unless-stopped \
              eunbie/room-measure-cloud:$IMAGE_TAG

            # 컨테이너 시작 대기 및 헬스체크
            echo "🔍 컨테이너 시작 대기 중..."
            sleep 15
            
            # 헬스체크 (3번 시도)
            for i in {1..3}; do
              echo "헬스체크 시도 $i/3..."
              if curl -fsS http://localhost:3000/health; then
                echo "✅ 배포 성공! 서비스가 정상 동작 중입니다."
                docker logs --tail=10 room-measure-cloud
                exit 0
              fi
              sleep 5
            done
            
            echo "❌ 헬스체크 실패 - 로그 확인"
            docker logs --tail=50 room-measure-cloud
            exit 1
