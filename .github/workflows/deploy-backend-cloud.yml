- name: Deploy on EC2 (no sudo)
  uses: appleboy/ssh-action@v0.1.5
  with:
    host: ${{ secrets.EUNBI_NODE_EC2_HOST }}
    username: node1
    key: ${{ secrets.EUNBI_NODE_EC2_SSH_KEY }}
    script: |
      set -euo pipefail

      # Docker 가용성 확인
      if ! docker info > /dev/null 2>&1; then
        echo "Docker가 실행 중이 아니거나 권한 문제입니다."; exit 1
      fi

      # 기존 컨테이너 정리
      docker stop room-measure-cloud 2>/dev/null || true
      docker rm room-measure-cloud 2>/dev/null || true

      # 앱 디렉토리 이동
      cd /home/node1/app/eunbi/room-measure/backend-cloud

      # .env 확인
      if [ ! -f .env ]; then
        if [ -f .env.example ]; then
          cp .env.example .env
          echo ".env.example을 .env로 복사했습니다."
        else
          echo ".env 파일이 필요합니다 (.env 또는 .env.example 준비)."; exit 1
        fi
      fi

      # 이미지 빌드
      echo "Docker 이미지 빌드..."
      docker build -t room-measure-cloud:${GITHUB_SHA} .

      # 컨테이너 실행
      echo "컨테이너 실행..."
      docker run -d --name room-measure-cloud \
        -p 3000:3000 \
        --env-file .env \
        --restart unless-stopped \
        room-measure-cloud:${GITHUB_SHA}

      # 헬스체크
      echo "서비스 기동 대기..."
      sleep 10
      if ! curl -fsS http://localhost:3000/health; then
        echo "헬스체크 실패. 최근 로그:"
        docker logs --tail=200 room-measure-cloud || true
        exit 1
      fi

      echo "배포 성공!"
      # 이전 이미지 정리 (sudo 제거)
      docker image prune -f || true
