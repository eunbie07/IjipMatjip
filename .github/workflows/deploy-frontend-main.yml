name: Deploy Frontend Main

on:
  push:
    branches: [ integration ]
    paths:
      - 'frontend-main/**'
      - '.github/workflows/deploy-frontend-main.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.EUNBI_DOCKERHUB_USERNAME }}
          password: ${{ secrets.EUNBI_DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          cd frontend-main
          IMAGE_TAG=${GITHUB_SHA}
          docker build \
            --build-arg VITE_LOCAL_API_BASE=${{ secrets.VITE_LOCAL_API_BASE }} \
            --build-arg VITE_CLOUD_API_BASE=${{ secrets.VITE_CLOUD_API_BASE }} \
            --build-arg VITE_AI_INTERIOR_API_BASE=${{ secrets.VITE_AI_INTERIOR_API_BASE }} \
            --build-arg VITE_GEMINI_API_KEY=${{ secrets.VITE_GEMINI_API_KEY }} \
            -t eunbie/frontend-main:$IMAGE_TAG .
          docker push eunbie/frontend-main:$IMAGE_TAG

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.EUNBI_NODE_EC2_HOST }}
          username: node1
          key: ${{ secrets.EUNBI_NODE_EC2_SSH_KEY }}
          envs: GITHUB_SHA
          script: |
            set -euo pipefail

            IMAGE_TAG=${GITHUB_SHA}
            docker stop frontend-main 2>/dev/null || true
            docker rm frontend-main 2>/dev/null || true

            docker pull eunbie/frontend-main:$IMAGE_TAG

            docker run -d \
              --name frontend-main \
              -p 80:80 \
              --restart unless-stopped \
              eunbie/frontend-main:$IMAGE_TAG

            sleep 10
            curl -fsS http://localhost || { echo "Frontend Main 헬스체크 실패"; docker logs --tail=50 frontend-main; exit 1; }
